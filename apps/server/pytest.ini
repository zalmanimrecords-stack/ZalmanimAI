[pytest]
testpaths = tests
# Make the `app` package importable under the bare `pytest` console script (CI),
# not only `python -m pytest` which implicitly adds the cwd to sys.path.
pythonpath = .
# Keep session temps under the repo with a stable ignored folder (avoids stray pytest-cache-files-* / .pytest_tmp ACL issues on some Windows setups).
addopts = --basetemp=.pytest_basetemp
