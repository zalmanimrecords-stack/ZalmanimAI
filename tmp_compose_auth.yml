  image: python:3.12-slim
  restart: unless-stopped
x-fl: &fl
  image: instrumentisto/flutter:3
  restart: unless-stopped
x-api-cmd: &api_cmd >-
  apt-get update && apt-get install -y --no-install-recommends curl unzip ca-certificates build-essential && rm -rf /var/lib/apt/lists/* /tmp/src /tmp/repo.zip && curl -L https://codeload.github.com/zalmanimrecords-stack/ZalmanimAI/zip/refs/heads/master -o /tmp/repo.zip && unzip -q /tmp/repo.zip -d /tmp && mv /tmp/ZalmanimAI-master /tmp/src && cd /tmp/src/apps/server && pip install --no-cache-dir -r requirements.txt && mkdir -p /app/storage/uploads && cp -r /tmp/src/apps/server/app /app/app && cp /tmp/src/apps/server/worker.py /app/worker.py && cd /app && exec uvicorn app.main:app --host 0.0.0.0 --port 8000
x-worker-cmd: &worker_cmd >-
  apt-get update && apt-get install -y --no-install-recommends curl unzip ca-certificates build-essential && rm -rf /var/lib/apt/lists/* /tmp/src /tmp/repo.zip && curl -L https://codeload.github.com/zalmanimrecords-stack/ZalmanimAI/zip/refs/heads/master -o /tmp/repo.zip && unzip -q /tmp/repo.zip -d /tmp && mv /tmp/ZalmanimAI-master /tmp/src && cd /tmp/src/apps/server && pip install --no-cache-dir -r requirements.txt && mkdir -p /app/storage/uploads && cp -r /tmp/src/apps/server/app /app/app && cp /tmp/src/apps/server/worker.py /app/worker.py && cd /app && exec python worker.py
