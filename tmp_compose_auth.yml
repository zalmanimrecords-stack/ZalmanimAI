services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [redis-server, --appendonly, yes]
    volumes: [redis_data:/data]
  api:
    image: python:3.12-slim
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES}
      UPLOAD_DIR: /app/storage/uploads
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE}
      OAUTH_SUCCESS_REDIRECT: ${OAUTH_SUCCESS_REDIRECT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      SMTP_USE_SSL: ${SMTP_USE_SSL}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      EMAILS_PER_HOUR: ${EMAILS_PER_HOUR}
      MAILCHIMP_API_KEY: ${MAILCHIMP_API_KEY}
      WORDPRESS_REST_BASE_URL: ${WORDPRESS_REST_BASE_URL}
      WORDPRESS_CLIENT_KEY: ${WORDPRESS_CLIENT_KEY}
      WORDPRESS_CLIENT_SECRET: ${WORDPRESS_CLIENT_SECRET}
      META_CLIENT_ID: ${META_CLIENT_ID}
      META_CLIENT_SECRET: ${META_CLIENT_SECRET}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      X_CLIENT_ID: ${X_CLIENT_ID}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      SOUNDCLOUD_CLIENT_ID: ${SOUNDCLOUD_CLIENT_ID}
      SOUNDCLOUD_CLIENT_SECRET: ${SOUNDCLOUD_CLIENT_SECRET}
      DEMO_SUBMISSION_TOKEN: ${DEMO_SUBMISSION_TOKEN}
    command: [bash, -lc, *api_cmd]
    volumes: [server_storage:/app/storage]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    labels:
      - traefik.enable=true
      - traefik.http.routers.lmapi.rule=Host(`lmapi.zalmanim.com`)
      - traefik.http.routers.lmapi.entrypoints=websecure
      - traefik.http.routers.lmapi.tls.certresolver=letsencrypt
      - traefik.http.services.lmapi.loadbalancer.server.port=8000
  worker:
    image: python:3.12-slim
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /app/storage/uploads
      MAILCHIMP_API_KEY: ${MAILCHIMP_API_KEY}
      WORDPRESS_REST_BASE_URL: ${WORDPRESS_REST_BASE_URL}
      WORDPRESS_CLIENT_KEY: ${WORDPRESS_CLIENT_KEY}
      WORDPRESS_CLIENT_SECRET: ${WORDPRESS_CLIENT_SECRET}
      DEMO_SUBMISSION_TOKEN: ${DEMO_SUBMISSION_TOKEN}
    command: [bash, -lc, *worker_cmd]
    volumes: [server_storage:/app/storage]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
  web:
    image: instrumentisto/flutter:3
    restart: unless-stopped
    environment:
      HOME: ${HOME}
      PUB_CACHE: ${PUB_CACHE}
      DEBIAN_FRONTEND: ${DEBIAN_FRONTEND}
    command: [bash, -lc, *web_cmd]
    depends_on:
      api: {condition: service_started}
    labels:
      - traefik.enable=true
      - traefik.http.routers.lm.rule=Host(`lm.zalmanim.com`)
      - traefik.http.routers.lm.entrypoints=websecure
      - traefik.http.routers.lm.tls.certresolver=letsencrypt
      - traefik.http.routers.lm.middlewares=prod-gate@docker
      - traefik.http.middlewares.prod-gate.basicauth.users=zalmanim:$$2y$$05$$KUoqOpnSP86pOru3a6wuredHzPBnEENKIzibYcWi/GfUvdYTVyk/W
      - traefik.http.middlewares.prod-gate.basicauth.removeheader=true
      - traefik.http.services.lm.loadbalancer.server.port=8080
  artist-web:
    image: instrumentisto/flutter:3
    restart: unless-stopped
    environment:
      HOME: ${HOME}
      PUB_CACHE: ${PUB_CACHE}
      DEBIAN_FRONTEND: ${DEBIAN_FRONTEND}
      API_BASE_URL: ${API_BASE_URL}
      DEMO_SUBMISSION_TOKEN: ${DEMO_SUBMISSION_TOKEN}
    command: [bash, -lc, *artist_cmd]
    depends_on:
      api: {condition: service_started}
    labels:
      - traefik.enable=true
      - traefik.http.routers.artists.rule=Host(`artists.zalmanim.com`)
      - traefik.http.routers.artists.entrypoints=websecure
      - traefik.http.routers.artists.tls.certresolver=letsencrypt
      - traefik.http.routers.artists.middlewares=prod-gate@docker
      - traefik.http.services.artists.loadbalancer.server.port=8081
volumes: {postgres_data: {}, redis_data: {}, server_storage: {}}
