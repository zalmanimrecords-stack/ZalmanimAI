services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labelops}
      POSTGRES_USER: ${POSTGRES_USER:-label}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-label}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-label} -d ${POSTGRES_DB:-labelops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopassword}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./apps/server
    image: zalmanimai-api:latest
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-label}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-labelops}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      UPLOAD_DIR: storage/uploads
      OAUTH_REDIRECT_BASE: http://localhost:8000/api/admin/social/callback
      META_CLIENT_ID: ${META_CLIENT_ID:-}
      META_CLIENT_SECRET: ${META_CLIENT_SECRET:-}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      SOUNDCLOUD_CLIENT_ID: ${SOUNDCLOUD_CLIENT_ID:-}
      SOUNDCLOUD_CLIENT_SECRET: ${SOUNDCLOUD_CLIENT_SECRET:-}
      MAILCHIMP_API_KEY: ${MAILCHIMP_API_KEY:-}
      WORDPRESS_REST_BASE_URL: ${WORDPRESS_REST_BASE_URL:-}
      WORDPRESS_CLIENT_KEY: ${WORDPRESS_CLIENT_KEY:-}
      WORDPRESS_CLIENT_SECRET: ${WORDPRESS_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_BACKUP_HOST: ${SMTP_BACKUP_HOST:-}
      SMTP_BACKUP_PORT: ${SMTP_BACKUP_PORT:-587}
      SMTP_BACKUP_USER: ${SMTP_BACKUP_USER:-}
      SMTP_BACKUP_PASSWORD: ${SMTP_BACKUP_PASSWORD:-}
      SMTP_BACKUP_USE_TLS: ${SMTP_BACKUP_USE_TLS:-true}
      SMTP_BACKUP_USE_SSL: ${SMTP_BACKUP_USE_SSL:-false}
      SMTP_BACKUP_FROM_EMAIL: ${SMTP_BACKUP_FROM_EMAIL:-}
      EMAILS_PER_HOUR: ${EMAILS_PER_HOUR:-30}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/server/storage:/app/storage
      - ./apps/server/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ./apps/server
    image: zalmanimai-worker:latest
    command: ["python", "worker.py"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-label}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-labelops}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      UPLOAD_DIR: storage/uploads
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MAILCHIMP_API_KEY: ${MAILCHIMP_API_KEY:-}
      WORDPRESS_REST_BASE_URL: ${WORDPRESS_REST_BASE_URL:-}
      WORDPRESS_CLIENT_KEY: ${WORDPRESS_CLIENT_KEY:-}
      WORDPRESS_CLIENT_SECRET: ${WORDPRESS_CLIENT_SECRET:-}
    volumes:
      - ./apps/server/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
